version: '3.8'

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: betuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betpassword_dev}
      POSTGRES_DB: betting_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betuser -d betting_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - betnet

  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - betnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      BET_DATABASE_URL: postgresql+asyncpg://betuser:${POSTGRES_PASSWORD:-betpassword_dev}@postgres:5432/betting_platform
      BET_JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      BET_CORS_ORIGINS: http://localhost:5174,http://localhost:3000,http://localhost:8001
      BET_DEBUG: "false"
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    networks:
      - betnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: http://localhost:8001
      ORIGIN: http://localhost:5174
    ports:
      - "127.0.0.1:5174:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - betnet

networks:
  betnet:
    driver: bridge

volumes:
  pgdata:
