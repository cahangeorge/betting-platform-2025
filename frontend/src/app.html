<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			(function() {
				var theme = localStorage.getItem('theme');
				if (theme === 'light') {
					document.documentElement.classList.remove('dark');
				} else {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#060B14" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="description" content="Betfront — Sports Betting Intelligence. AI-powered football betting analytics, real-time odds comparison, and portfolio tracking." />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Betfront" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="color-scheme" content="light dark" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<title>Betfront — Sports Betting Intelligence</title>
		%sveltekit.head%
	</head>
	<body class="antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
